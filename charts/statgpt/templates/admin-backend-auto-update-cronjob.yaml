{{- $adminBackend := index .Values "admin-backend" }}
{{- $cron := index $adminBackend "autoUpdateCronJob" | default dict }}
{{- if and $adminBackend.enabled $cron.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ (printf "%s-auto-update" ($adminBackend.fullnameOverride | default (printf "%s-admin-backend" .Release.Name))) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" (dict "customLabels" $adminBackend.commonLabels "context" $) | nindent 4 }}
spec:
  schedule: {{ $cron.schedule | default "0 0 * * *" | quote }}
  concurrencyPolicy: {{ $cron.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ $cron.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ $cron.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      backoffLimit: {{ $cron.backoffLimit | default 2 }}
      {{- if ne $cron.ttlSecondsAfterFinished nil }}
      ttlSecondsAfterFinished: {{ int $cron.ttlSecondsAfterFinished }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "common.labels.standard" (dict "customLabels" $adminBackend.commonLabels "context" $) | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: auto-update
              image: "{{ $adminBackend.image.registry }}/{{ $adminBackend.image.repository }}:{{ $adminBackend.image.tag }}"
              imagePullPolicy: "{{ $adminBackend.image.pullPolicy }}"
              env:
                - name: ADMIN_MODE
                  value: "AUTO_UPDATE"
                {{- $envVars := list "PGVECTOR_HOST" "PGVECTOR_PORT" "PGVECTOR_DATABASE" "PGVECTOR_USE_MSI" "PGVECTOR_MSI_SCOPE" "PGVECTOR_MSI_TOKEN_REFRESH_TIMEOUT" }}
                {{- range $envVars }}
                {{- $val := index $adminBackend.env . }}
                {{- if $val }}
                - name: {{ . }}
                  value: {{ $val | quote }}
                {{- end }}
                {{- end }}
                {{- $secretVars := list "PGVECTOR_USER" "PGVECTOR_PASSWORD" }}
                {{- range $secretVars }}
                {{- $val := index ($adminBackend.secrets | default dict) . }}
                {{- if $val }}
                - name: {{ . }}
                  value: {{ $val | quote }}
                {{- end }}
                {{- end }}
              resources:
                {{- toYaml ($cron.resources | default (dict "limits" (dict "cpu" "500m" "memory" "1Gi") "requests" (dict "cpu" "100m" "memory" "512Mi"))) | nindent 16 }}
{{- end }}
